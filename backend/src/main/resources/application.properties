
spring.application.name=SystemVotting

server.port=8080
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# --- SERVER & TOMCAT TUNING FOR HIGH CONCURRENCY ---
# 200 threads is optimal for most workloads. 1000 threads causes OS-level context-switch
# thrashing and actually degrades throughput under sustained concurrent load.
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=25
server.tomcat.max-connections=5000
server.tomcat.accept-count=1000
server.tomcat.connection-timeout=10000

# --- DATABASE CONNECTION POOL (HIKARICP) ---
# Formula: pool_size = (cpu_cores * 2) + effective_spindle_count
# For 4-core + SSD: ~10-20 connections is optimal. 100+ causes DB-side context-switch overhead.
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000

#spring.datasource.url=${DB_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
#spring.datasource.driverClassName=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#
app.security.jwt.expiration=900000
app.security.jwt.refresh-token.expiration=604800000

#
spring.mail.host=smtp.gmail.com
spring.mail.port=587

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
# Optional; leave blank for local Redis without ACL
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=3000ms
# Lettuce connection pool (requires commons-pool2 on classpath — already present in pom.xml)
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=50
spring.data.redis.lettuce.pool.max-idle=20
spring.data.redis.lettuce.pool.min-idle=10
spring.data.redis.lettuce.pool.max-wait=2000ms
spring.data.redis.lettuce.pool.time-between-eviction-runs=30s

# AI Moderation Service timeouts
ai.service.url=${AI_SERVICE_URL:http://localhost:8000/check-toxicity}
ai.service.connect-timeout-ms=500
ai.service.read-timeout-ms=1500

# Ac
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Springdoc / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# --- VNPAY CONFIGURATION ---
vnpay.tmnCode=${VNPAY_TMN_CODE}
vnpay.hashSecret=${VNPAY_HASH_SECRET}
vnpay.payUrl=${VNPAY_PAY_URL}
vnpay.returnUrl=${VNPAY_RETURN_URL}

