# Server Configuration
server.port=${PORT:10000}

# Database Configuration (MySQL/Railway/Render)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false

# Secrets & Security
app.security.jwt.secret-key=${JWT_SECRET_KEY}

# Google OAuth2
app.security.oauth2.google.client-id=${GOOGLE_CLIENT_ID}

# --- Java Mail Sender Configuration (Gmail SMTP) ---
spring.mail.host=smtp.gmail.com
# Quan tr?ng: Render c?n xßc ??nh r§ Port
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.default-encoding=UTF-8

# SMTP Properties
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Timeout settings (Gi·p app kh¶ng b? treo khi mail server ch?m)
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Fix l?i k?t n?i trĻn m?t s? m¶i tr??ng Cloud (?u tiĻn IPv4)
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com