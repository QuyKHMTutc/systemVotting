# Secrets & Credentials
app.security.jwt.secret-key=${JWT_SECRET_KEY}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# Google OAuth2 Client ID
app.security.oauth2.google.client-id=${GOOGLE_CLIENT_ID}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# HikariCP - Optimal pool size formula: (cpu_cores * 2) + 1 = ~9-20 for typical dev machines
# High pool counts (100+) cause DB-side context-switch overhead and hurt performance
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Tomcat thread pool
# 200 is the sweet spot - beyond that, OS context-switching overhead hurts throughput
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=25
server.tomcat.accept-count=1000

# AI Moderation Service (local Python FastAPI)
ai.service.url=http://localhost:8000/check-toxicity
ai.service.connect-timeout-ms=500
ai.service.read-timeout-ms=1500

# Prevent DevTools from resetting bean definitions on hot-reload
spring.devtools.restart.enabled=true
spring.main.allow-bean-definition-overriding=false
