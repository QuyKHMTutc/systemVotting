# Secrets & Credentials
app.security.jwt.secret-key=${JWT_SECRET_KEY}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# Google OAuth2 Client ID
app.security.oauth2.google.client-id=${GOOGLE_CLIENT_ID}

# Redis — pool nhỏ hơn base config; đủ cho 1 developer trên laptop
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

# HikariCP — máy local: ít kết nối hơn giảm tải MySQL và RAM
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true
spring.datasource.hikari.data-source-properties.rewriteBatchedStatements=true

# Tomcat — đủ cho dev; giảm context-switch khi chỉ tự test trên máy
server.tomcat.threads.max=64
server.tomcat.threads.min-spare=4
server.tomcat.accept-count=200

# AI Moderation Service (local Python FastAPI)
ai.service.url=http://localhost:8000/check-toxicity
ai.service.connect-timeout-ms=500
ai.service.read-timeout-ms=1500

# Prevent DevTools from resetting bean definitions on hot-reload
spring.devtools.restart.enabled=true
spring.main.allow-bean-definition-overriding=false

# Hibernate fetch tuning for lazy associations to reduce N+1 overhead
spring.jpa.properties.hibernate.default_batch_fetch_size=50

# Response compression improves perceived speed under network load
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=1024