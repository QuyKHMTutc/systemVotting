
spring.datasource.url=jdbc:mysql://localhost:3306/systemvotting
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

# Hibernate — local dev: less console I/O and faster requests than show-sql + format_sql
# Bật lại khi cần debug: spring.jpa.show-sql=true và logging.level.org.hibernate.orm.jdbc.bind=TRACE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
