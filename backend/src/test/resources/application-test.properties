spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

app.security.jwt.secret-key=test_secret_key_that_is_long_enough_for_hmac_sha256
app.security.jwt.expiration=900000
app.security.jwt.refresh-token.expiration=604800000

spring.mail.username=test
spring.mail.password=test

app.security.oauth2.google.client-id=test-client-id

spring.data.redis.host=localhost
spring.data.redis.port=6379
