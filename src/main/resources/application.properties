spring.application.name=SystemVotting

# Server Port
server.port=8080

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/systemvotting?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=190399

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Secret Key (Should be externalized in production)
app.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# Access token: 15 minutes (900000 ms)
app.security.jwt.expiration=900000
# Refresh token: 7 days (604800000 ms)
app.security.jwt.refresh-token.expiration=604800000

# Mail Server Configuration (Gmail example)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Actuator Endpoints Config (For /health, /info etc.)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always